  <rect width="1200" height="800" fill="#0b1020"/>
  <circle cx="600" cy="400" r="255" fill="none" stroke="#d7b56d" stroke-width="4" stroke-dasharray="12 10"/>
  <circle cx="600" cy="400" r="115" fill="none" stroke="#7dd3fc" stroke-width="3"/>
  <text x="600" y="390" fill="#ffffff" font-family="serif" font-size="38" text-anchor="middle">FHQCM</text>
  <text x="600" y="430" fill="#d7b56d" font-family="serif" font-size="22" text-anchor="middle">recursive consciousness field</text>
  <g fill="#ffffff" font-family="serif" font-size="26" text-anchor="middle">
