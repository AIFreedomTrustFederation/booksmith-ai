    <path d="M875 285 C925 385 925 475 875 525"/>
    <path d="M835 590 C760 660 685 700 630 705"/>
    <path d="M570 705 C470 685 390 630 350 590"/>
    <path d="M325 525 C275 430 275 330 325 285"/>
    <path d="M355 225 C430 155 520 120 570 115"/>
  </g>
  <defs>
