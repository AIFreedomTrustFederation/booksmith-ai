<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Christic Equivalency</title>
  <desc id="desc">Symbolic equivalencies held together by a central equal sign.</desc>
  <rect width="1200" height="800" fill="#09090b"/>
  <text x="600" y="95" fill="#f8fafc" font-family="serif" font-size="42" text-anchor="middle">Christic Equivalency</text>
  <text x="600" y="150" fill="#d7b56d" font-family="serif" font-size="24" text-anchor="middle">the equal sign as harmonic reconciliation</text>
  <text x="600" y="430" fill="#d7b56d" font-family="serif" font-size="190" text-anchor="middle">=</text>
  <g fill="#ffffff" font-family="serif" font-size="38">
    <text x="260" y="300" text-anchor="middle">Wave</text>
    <text x="940" y="300" text-anchor="middle">Particle</text>
    <text x="260" y="390" text-anchor="middle">Spirit</text>
    <text x="940" y="390" text-anchor="middle">Matter</text>
    <text x="260" y="480" text-anchor="middle">Past</text>
    <text x="940" y="480" text-anchor="middle">Future</text>
    <text x="260" y="570" text-anchor="middle">Self</text>
    <text x="940" y="570" text-anchor="middle">Other</text>
  </g>
  <g stroke="#7dd3fc" stroke-width="3" opacity="0.75">
    <line x1="350" y1="288" x2="500" y2="380"/>
    <line x1="850" y1="288" x2="700" y2="380"/>
    <line x1="350" y1="388" x2="500" y2="400"/>
    <line x1="850" y1="388" x2="700" y2="400"/>
    <line x1="350" y1="488" x2="500" y2="420"/>
    <line x1="850" y1="488" x2="700" y2="420"/>
  </g>
</svg>
